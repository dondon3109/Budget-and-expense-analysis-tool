<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f0e8" />
    <script>
      (() => {
        let theme;
        try {
          const saved = localStorage.getItem("clarity-theme");
          if (saved === "light" || saved === "dark") theme = saved;
        } catch {}
        if (!theme) {
          try {
            theme = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          } catch {
            theme = "light";
          }
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", theme === "dark" ? "#101814" : "#f3f0e8");
      })();
    </script>
    <meta
      name="description"
      content="A clear, privacy-conscious workspace for understanding expenses, budgets, and monthly cash flow."
    />
    <title>Clarity — Budget and expense analysis</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
